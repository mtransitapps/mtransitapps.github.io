name: Merge RSS Feed PR

on:
  schedule:
    # Run at both possible times, then check which timezone is currently active
    # 21:59 UTC aligns with 5:59 PM when EDT is in effect (EDT = UTC-4)
    - cron: '59 21 2 * *'  # 21:59 UTC on the 2nd of each month
    # 22:59 UTC aligns with 5:59 PM when EST is in effect (EST = UTC-5)
    - cron: '59 22 2 * *'  # 22:59 UTC on the 2nd of each month
  workflow_dispatch:  # Allow manual triggering for testing

permissions:
  contents: write
  pull-requests: write

jobs:
  merge-rss-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Check if current time matches timezone
        id: check_timezone
        run: |
          # Get current time in America/Montreal timezone
          current_hour=$(TZ='America/Montreal' date +%H)
          current_minute=$(TZ='America/Montreal' date +%M)
          
          echo "Current time in America/Montreal: ${current_hour}:${current_minute}"
          
          # We want to run around 17:59 (5:59 PM) local time
          # Allow a range to account for GitHub Actions scheduling delays (typically a few minutes)
          if [ "$current_hour" = "17" ] && [ "$current_minute" -ge 58 ]; then
            echo "✅ Correct time to run (approximately 5:59 PM local time)"
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "$current_hour" = "18" ] && [ "$current_minute" -le 2 ]; then
            echo "✅ Correct time to run (approximately 5:59 PM local time, with delay)"
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "⏭️ Skipping - not the correct local time (expected ~17:59, got ${current_hour}:${current_minute})"
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository
        if: steps.check_timezone.outputs.should_run == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find and merge PR with lastmonth branch
        if: steps.check_timezone.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Find open PRs with branch name containing "lastmonth"
          echo "Searching for open PRs with 'lastmonth' in branch name..."

          # Get list of open PRs
          prs=$(gh pr list --state open --json number,headRefName,title)
          echo "Open PRs: $prs"

          # Filter PRs with "lastmonth" in branch name
          pr_number=$(echo "$prs" | jq -r '.[] | select(.headRefName | contains("lastmonth")) | .number' | head -1)

          if [ -z "$pr_number" ]; then
            echo "⚠️ No open PR found with 'lastmonth' in branch name"
            echo "Note: This is expected if the PR was already merged or hasn't been created yet"
            exit 0
          fi

          echo "Found PR #$pr_number with lastmonth branch"

          # Get PR details
          pr_info=$(gh pr view "$pr_number" --json headRefName,title,mergeable)
          echo "PR Info: $pr_info"

          branch_name=$(echo "$pr_info" | jq -r '.headRefName')
          pr_title=$(echo "$pr_info" | jq -r '.title')
          mergeable=$(echo "$pr_info" | jq -r '.mergeable')

          echo "Branch: $branch_name"
          echo "Title: $pr_title"
          echo "Mergeable: $mergeable"

          # Check if PR is mergeable
          if [ "$mergeable" != "MERGEABLE" ]; then
            echo "⚠️ PR #$pr_number is not mergeable (status: $mergeable)"
            echo "Action required: Check GitHub Actions logs and manually merge the PR"
            echo "PR URL: https://github.com/${{ github.repository }}/pull/$pr_number"
            exit 1
          fi

          # Merge the PR
          echo "Merging PR #$pr_number..."
          gh pr merge "$pr_number" --squash --delete-branch

          echo "✅ Successfully merged PR #$pr_number"
